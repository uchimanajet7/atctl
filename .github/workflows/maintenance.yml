name: Dependency Maintenance

on:
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "about.toml"
      - "about.hbs"
      - "licenses/third-party/**"
      - ".github/dependabot.yml"
      - ".github/workflows/**"
      - "scripts/maintenance/**"
      - "scripts/release/**"
  schedule:
    - cron: "23 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-maintenance:
    name: Check dependency and workflow drift
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      ATCTL_OUTDATED_EXIT_CODE: "1"
      CARGO_TERM_COLOR: always
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Rust maintenance tools
        shell: bash
        run: |
          set -euo pipefail
          rustc -Vv
          cargo -V
          source scripts/maintenance/tool-versions.env
          cargo install cargo-audit --locked
          cargo install --locked cargo-about --version "${CARGO_ABOUT_VERSION}" --features cli
          cargo install cargo-outdated --locked

      - name: Install native dependency metadata tools
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes libusb-1.0-0-dev pkg-config

      - name: Check dependency and workflow state
        shell: bash
        run: scripts/maintenance/check-deps.sh
