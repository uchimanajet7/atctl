title = "SORACOM Sequences"
description = "SORACOM-specific network reachability and TCP endpoint checks using Quectel TCP/IP AT commands."

[[sequences]]
name = "soracom-ping-check"
summary = "Ping the SORACOM Ping Response service through a Quectel PDP context and report received replies."
risk = "write"
categories = ["data", "network", "diagnostics"]
timeout_secs = 120
before_running = [
  "Uses Quectel AT+QPING to check SORACOM network reachability.",
  "Confirm the PDP context before sending; this Sequence can load standard AT+CGACT? and AT+CGDCONT? candidates in the TUI.",
  "During execution, atctl checks AT+QIACT? and sends AT+QIACT=<contextID> only when the selected Quectel PDP context is not active."
]
success_notes = [
  "Received ping replies from pong.soracom.io are SORACOM network reachability evidence.",
  "Ping success is not TCP socket, Unified Endpoint, Beam, or destination application receipt proof.",
  "Use soracom-unified-endpoint-tcp-send-check when TCP payload delivery to Unified Endpoint must be checked."
]

[[sequences.params]]
name = "context_id"
label = "PDP context ID"
required = true
sensitive = false
default = "1"
source = "modem"
candidate = "pdp-context"
hint = "Confirm the PDP context with AT+CGACT? or AT+CGDCONT? before sending."

[[sequences.params]]
name = "ping_timeout"
label = "Ping timeout"
required = true
sensitive = false
default = "4"
source = "default"
hint = "Timeout in seconds for each ping request."

[[sequences.params]]
name = "count"
label = "Ping count"
required = true
sensitive = false
default = "4"
source = "default"
hint = "Number of ping requests to send."

[[sequences.review]]
label = "Destination"
value = "pong.soracom.io"

[[sequences.review]]
label = "Ping timeout"
value = "{{ping_timeout}}s"

[[sequences.review]]
label = "Ping count"
value = "{{count}}"

[[sequences.steps]]
id = "activate-context"
label = "Ensure PDP context active"
ensure_pdp_context_active = "{{context_id}}"
timeout_secs = 150
evidence = "AT+QIACT? checks Quectel TCP/IP PDP context state; AT+QIACT=<contextID> is only sent when the selected context is not active."

[[sequences.steps]]
id = "ping-soracom"
label = "Ping SORACOM"
send = "AT+QPING={{context_id}},\"pong.soracom.io\",{{ping_timeout}},{{count}}"
expect_urc = "+QPING:"
require_ping_success = true
timeout_secs = 90
evidence = "AT+QPING checks IP reachability through the selected Quectel PDP context; received replies are not TCP or application receipt proof."

[[sequences]]
name = "soracom-unified-endpoint-tcp-send-check"
summary = "Send a payload to SORACOM Unified Endpoint over a Quectel TCP socket and read any buffered response."
risk = "write"
categories = ["data", "network"]
timeout_secs = 300
before_running = [
  "Uses Quectel TCP/IP AT commands to send to SORACOM Unified Endpoint.",
  "Confirm the PDP context before sending; this Sequence can load standard AT+CGACT? and AT+CGDCONT? candidates in the TUI.",
  "During execution, atctl checks AT+QIACT? and sends AT+QIACT=<contextID> only when the selected Quectel PDP context is not active.",
  "Socket connect ID defaults to 0. If needed, run the Quectel socket-state add-on command and edit this value before sending."
]
success_notes = [
  "Unified Endpoint TCP socket evidence is not destination service receipt by itself.",
  "End-to-end success requires non-empty QIRD response data or SORACOM destination service logs.",
  "When message boundaries matter, use Soracom Binary Format v1, an HTTP entry point, or application framing."
]

[[sequences.params]]
name = "context_id"
label = "PDP context ID"
required = true
sensitive = false
default = "1"
source = "modem"
candidate = "pdp-context"
hint = "Confirm the PDP context with AT+CGACT? or AT+CGDCONT? before sending."

[[sequences.params]]
name = "connect_id"
label = "Socket connect ID"
required = true
sensitive = false
default = "0"
source = "default"
hint = "Use a free Quectel socket connect ID. Run the Quectel socket-state add-on command when you need to inspect current sockets."

[[sequences.params]]
name = "payload"
label = "Payload"
required = true
sensitive = true
source = "user"
hint = "Enter the payload to send to SORACOM Unified Endpoint."

[[sequences.params]]
name = "read_length"
label = "Read length"
required = true
sensitive = false
default = "1500"
source = "default"
hint = "Edit when the expected Unified Endpoint response is larger or when a smaller read is required."

[[sequences.review]]
label = "Destination"
value = "unified.soracom.io:23080"

[[sequences.review]]
label = "Payload"
value = "{{payload}}"
sensitive = true

[[sequences.review]]
label = "Read length"
value = "{{read_length}}"

[[sequences.steps]]
id = "activate-context"
label = "Ensure PDP context active"
ensure_pdp_context_active = "{{context_id}}"
timeout_secs = 150
evidence = "AT+QIACT? checks Quectel TCP/IP PDP context state; AT+QIACT=<contextID> is only sent when the selected context is not active."

[[sequences.steps]]
id = "open-socket"
label = "Open TCP socket"
send = "AT+QIOPEN={{context_id}},{{connect_id}},\"TCP\",\"unified.soracom.io\",23080,0,0"
expect_urc = "+QIOPEN: {{connect_id}},0"
timeout_secs = 150
evidence = "+QIOPEN: {{connect_id}},0 is Quectel socket-open success evidence for Unified Endpoint TCP."
cleanup_on_failure = "AT+QICLOSE={{connect_id}}"

[[sequences.steps]]
id = "start-payload-send"
label = "Start payload send"
send = "AT+QISEND={{connect_id}},{{payload_len}}"
expect_prompt = ">"
timeout_secs = 30

[[sequences.steps]]
id = "write-payload"
label = "Write payload"
payload = "{{payload}}"
terminator = "none"
expect = "SEND OK"
timeout_secs = 60
evidence = "SEND OK means the Quectel module accepted the payload for sending, not SORACOM application receipt."

[[sequences.steps]]
id = "query-send-ack"
label = "Query send acknowledgement"
send = "AT+QISEND={{connect_id}},0"
expect = "+QISEND:"
require_tcp_ack = true
timeout_secs = 30
evidence = "AT+QISEND={{connect_id}},0 returns TCP/socket acknowledgement counters, not SORACOM destination processing proof."

[[sequences.steps]]
id = "read-buffer"
label = "Read buffered response"
send = "AT+QIRD={{connect_id}},{{read_length}}"
expect = "OK"
timeout_secs = 30
evidence = "Non-empty QIRD response data is receive evidence; SORACOM destination logs are needed when no response is returned."

[[sequences.steps]]
id = "close-socket"
label = "Close TCP socket"
send = "AT+QICLOSE={{connect_id}}"
expect = "OK"
timeout_secs = 10
